apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/tracking-id: sohilaahmed:apps/Deployment:default/flask-app-deployment
  labels:
    app: flask-app
  name: flask-app-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - args:
            - pip install flask && python -c "from flask import Flask; app=Flask(__name__); @app.route('/'); def home(): return 'Hello from Flask'; app.run(host='0.0.0.0', port=5000)"
          command:
            - /bin/sh
            - '-c'
          env:
            - name: FLASK_ENV
              value: production
          image: python:3.11-slim
          name: flask-app
          ports:
            - containerPort: 5000
